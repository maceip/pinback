name: platform shells

on:
  push:
    branches: ["main"]
    paths: ["platform/**", ".github/workflows/platform-shells.yml"]
  pull_request:
    paths: ["platform/**", ".github/workflows/platform-shells.yml"]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "create or update a github release with the debug assets"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "release tag to create/update when publish_release is true"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  linux:
    name: linux debug (gtk4 + webkitgtk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install gtk4 + webkitgtk + meson
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwebkitgtk-6.0-dev meson ninja-build pkg-config
      - name: build debug
        working-directory: platform/linux
        run: |
          meson setup build --buildtype=debug
          meson compile -C build
          test -x build/pinback-shell
      - name: package
        working-directory: platform/linux
        run: |
          mkdir -p dist/pinback-linux-debug
          cp build/pinback-shell dist/pinback-linux-debug/
          cp dev.pinback.shell.desktop dist/pinback-linux-debug/
          cp -R icons dist/pinback-linux-debug/
          tar -czf dist/pinback-linux-debug.tar.gz -C dist pinback-linux-debug
      - uses: actions/upload-artifact@v4
        with:
          name: pinback-linux-debug
          path: platform/linux/dist/pinback-linux-debug.tar.gz
          if-no-files-found: error

  windows:
    name: windows debug (win32 + webview2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure
        working-directory: platform/windows
        run: cmake -S . -B build -A x64
      - name: build debug
        working-directory: platform/windows
        run: cmake --build build --config Debug
      - name: verify artifact
        working-directory: platform/windows
        shell: pwsh
        run: Test-Path build/Debug/pinback-shell.exe
      - name: package
        working-directory: platform/windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\pinback-windows-debug | Out-Null
          Copy-Item build\Debug\pinback-shell.exe dist\pinback-windows-debug\
          if (Test-Path README.md) { Copy-Item README.md dist\pinback-windows-debug\ }
          Compress-Archive -Path dist\pinback-windows-debug -DestinationPath dist\pinback-windows-debug.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: pinback-windows-debug
          path: platform/windows/dist/pinback-windows-debug.zip
          if-no-files-found: error

  macos:
    name: macos debug (appkit + wkwebview)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: build backend
        run: make pinback-server
      - name: build shell debug
        working-directory: platform/macos
        run: swift build -c debug
      - name: package app
        working-directory: platform/macos
        run: |
          rm -rf dist Pinback-debug.app
          mkdir -p Pinback-debug.app/Contents/MacOS Pinback-debug.app/Contents/Resources dist
          cp .build/debug/PinbackShell Pinback-debug.app/Contents/MacOS/PinbackShell
          cp ../../pinback-server Pinback-debug.app/Contents/MacOS/pinback-server
          cp Resources/AppIcon.icns Pinback-debug.app/Contents/Resources/AppIcon.icns
          cat > Pinback-debug.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>PinbackShell</string>
              <key>CFBundleIdentifier</key><string>dev.pinback.shell.debug</string>
              <key>CFBundleName</key><string>Pinback Debug</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>0.1.0</string>
              <key>CFBundleVersion</key><string>${{ github.run_number }}</string>
              <key>LSMinimumSystemVersion</key><string>13.0</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>NSAppTransportSecurity</key>
              <dict><key>NSAllowsLocalNetworking</key><true/></dict>
          </dict>
          </plist>
          PLIST
          ( zip -r -X dist/pinback-macos-debug.zip Pinback-debug.app >/dev/null )
      - uses: actions/upload-artifact@v4
        with:
          name: pinback-macos-debug
          path: platform/macos/dist/pinback-macos-debug.zip
          if-no-files-found: error

  ios:
    name: ios simulator debug (swiftui webview)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: check sdk
        id: sdk
        shell: bash
        run: |
          if xcodebuild -showsdks | grep -q 'iphonesimulator26'; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "ios 26 simulator sdk is not available on this runner; skipping ios debug artifact" > ios-sdk-skipped.txt
          fi
      - name: upload sdk skip marker
        if: steps.sdk.outputs.available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pinback-ios-simulator-debug-skipped
          path: ios-sdk-skipped.txt
      - name: build simulator debug
        if: steps.sdk.outputs.available == 'true'
        working-directory: platform/ios
        run: CONFIG=Debug DEST='platform=iOS Simulator,name=iPhone 17' ./build.sh
      - name: package simulator app
        if: steps.sdk.outputs.available == 'true'
        run: |
          app="$(find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Build/Products/Debug-iphonesimulator/Pinback.app' -type d | sort | tail -1)"
          test -d "$app"
          mkdir -p platform/ios/dist
          tmp="$(mktemp -d)"
          cp -R "$app" "$tmp/Pinback.app"
          ( cd "$tmp" && zip -r -X "$GITHUB_WORKSPACE/platform/ios/dist/pinback-ios-simulator-debug.zip" Pinback.app >/dev/null )
      - uses: actions/upload-artifact@v4
        if: steps.sdk.outputs.available == 'true'
        with:
          name: pinback-ios-simulator-debug
          path: platform/ios/dist/pinback-ios-simulator-debug.zip
          if-no-files-found: error

  android:
    name: android debug (webview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: build debug apk
        working-directory: platform/android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: pinback-android-debug
          path: platform/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish-release:
    name: publish debug release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, ios, android]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: flatten assets
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.zip' -o -name '*.apk' -o -name '*.tar.gz' -o -name '*.txt' \) -print -exec cp {} release-assets/ \;
          ls -lh release-assets
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag="$INPUT_RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="platform-debug-${GITHUB_RUN_NUMBER}"
          fi
          title="platform debug builds ${tag}"
          notes="debug platform builds from ${GITHUB_SHA} via workflow run ${GITHUB_RUN_ID}."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --title "$title" --notes "$notes" --target "$GITHUB_SHA"
          fi
