name: platform shells

# Compiles the platform/ webview shells on native runners so the shells get real
# build coverage. Linux, Windows, and Android build on stock GitHub runners today.
# macOS and iOS are intentionally NOT built here: they require the new SwiftUI
# WebView/WebPage API, which needs the macOS 26 / iOS 26 SDK (Xcode 26 beta) that
# hosted macOS runners do not yet ship — build those locally with Xcode 26.

on:
  push:
    branches: ["claude/platform-webview-shells-Um6v8"]
    paths: ["platform/**", ".github/workflows/platform-shells.yml"]
  pull_request:
    paths: ["platform/**", ".github/workflows/platform-shells.yml"]
  workflow_dispatch:

jobs:
  linux:
    name: linux (GTK4 + WebKitGTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 + WebKitGTK + Meson
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwebkitgtk-6.0-dev meson ninja-build pkg-config
      - name: Build
        working-directory: platform/linux
        run: |
          meson setup build
          meson compile -C build
          test -x build/pinback-shell

  windows:
    name: windows (Win32 + WebView2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        working-directory: platform/windows
        run: cmake -S . -B build -A x64
      - name: Build
        working-directory: platform/windows
        run: cmake --build build --config Release
      - name: Verify artifact
        working-directory: platform/windows
        shell: pwsh
        run: Test-Path build/Release/pinback-shell.exe

  android:
    name: android (WebView)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build debug APK
        working-directory: platform/android
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: pinback-android-debug
          path: platform/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
