name: pinback-server

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "ui/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "ui/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/server.yml"
  workflow_dispatch:

jobs:
  test-macos:
    name: macos (make test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          make test
          test -x build/pinback-server
          test -x build/fake-ds4-agent

  test-linux:
    name: linux (make test)
    runs-on: ubuntu-latest
    steps:
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          make test
          test -x build/pinback-server
