<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>pinback</title>
<style>
:root{
  --bg:#0d0f14; --bg-soft:#13161e; --bg-elev:#181c26; --line:#1f2533;
  --fg:#e6e7eb; --fg-mute:#7a8090; --fg-dim:#4a5060;
  --user:#1d2a4d; --user-line:#274075; --user-fg:#dce5ff;
  --asst:#13161e; --asst-line:#23283a; --asst-fg:#e6e7eb;
  --tool:#10141d; --tool-line:#1d2336;
  --accent:#7ab7ff; --accent-strong:#9ec6ff; --warn:#e8b86b; --err:#e96b6b;
  --code-bg:#0a0c11; --code-fg:#cdd2dc;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font:14px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--bg); color:var(--fg);
  display:flex; flex-direction:column;
}
header{
  flex:0 0 auto;
  display:flex; align-items:center; gap:10px;
  padding:8px 14px;
  background:var(--bg-soft);
  border-bottom:1px solid var(--line);
  font-size:12px;
  position:relative;
}
header .brand{font-weight:600;color:var(--accent);letter-spacing:.5px}
header .runtime{
  display:flex; gap:14px; align-items:center;
  color:var(--fg-mute);
}
header .runtime .dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--fg-dim); margin-right:6px; vertical-align:middle;
}
header .runtime .dot.ok{background:#5ec27d}
header .runtime .dot.warn{background:var(--warn)}
header .runtime .dot.err{background:var(--err)}

#ws-picker{
  flex:1 1 auto; min-width:0;
  display:flex; align-items:center; gap:8px;
}
#ws-button{
  font:inherit;
  background:var(--bg-elev); color:var(--fg);
  border:1px solid var(--line); border-radius:var(--r);
  padding:5px 10px; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  max-width:520px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#ws-button:hover{border-color:var(--accent)}
#ws-button .label{font-weight:600}
#ws-button .path{color:var(--fg-mute); font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace; font-size:11.5px}
#ws-button .caret{color:var(--fg-mute); font-size:10px; margin-left:auto}

header button{
  font:inherit;
  background:var(--bg-elev); color:var(--fg-mute);
  border:1px solid var(--line); border-radius:var(--r);
  padding:5px 10px; cursor:pointer;
}
header button:hover{color:var(--fg);border-color:var(--accent)}
header button.danger{color:var(--err);border-color:#3a1f25}
header button.danger:hover{background:#2a151b;color:#ffb6b6}

#ws-tray{
  display:none;
  position:absolute; left:14px; top:42px;
  background:var(--bg-elev); border:1px solid var(--line);
  border-radius:var(--r);
  font-size:12px; color:var(--fg);
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  width:min(540px, 90vw);
  z-index:10;
}
#ws-tray.open{display:block}
#ws-tray h4{
  font-size:11px; text-transform:uppercase; letter-spacing:.5px;
  color:var(--fg-mute); padding:10px 12px 6px; font-weight:600;
}
#ws-list{max-height:260px; overflow-y:auto; padding:0 6px}
#ws-list .row{
  display:flex; align-items:center; gap:8px;
  padding:6px 8px; border-radius:var(--r); cursor:pointer;
}
#ws-list .row:hover{background:var(--bg-soft)}
#ws-list .row.active{background:var(--bg-soft)}
#ws-list .row .marker{
  width:8px; height:8px; border-radius:50%;
  background:var(--fg-dim); flex:0 0 auto;
}
#ws-list .row.active .marker{background:#5ec27d}
#ws-list .col{flex:1 1 auto; min-width:0; overflow:hidden}
#ws-list .name{font-weight:600; color:var(--fg);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
#ws-list .path{
  color:var(--fg-mute);
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  font-size:11px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#ws-list .row-actions{display:flex; gap:4px; flex:0 0 auto}
#ws-list .row-actions button{
  font-size:11px; padding:3px 8px;
  background:transparent; color:var(--fg-mute);
  border:1px solid var(--line); border-radius:var(--r); cursor:pointer;
}
#ws-list .row-actions button:hover{color:var(--fg);border-color:var(--accent)}
#ws-list .row-actions button.danger:hover{color:var(--err);border-color:#3a1f25}
#ws-list .empty{
  color:var(--fg-mute); padding:14px 12px; font-style:italic;
  text-align:center;
}
#ws-new{
  display:flex; gap:6px; padding:10px 12px;
  border-top:1px solid var(--line);
}
#ws-new input{
  flex:1 1 auto;
  background:var(--bg); color:var(--fg);
  border:1px solid var(--line); border-radius:var(--r);
  padding:5px 8px; font:inherit;
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  font-size:12px;
}
#ws-new input:focus{outline:none; border-color:var(--accent)}
#ws-new button{
  background:var(--accent); color:#0a0c11; border-color:var(--accent);
  font-weight:600;
}
#ws-new button:hover{background:var(--accent-strong); color:#0a0c11}

#chat{
  flex:1 1 auto; overflow-y:auto;
  padding:18px 16px; display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}
.msg{
  max-width:min(880px, 92%);
  padding:10px 14px; border-radius:10px;
  white-space:pre-wrap; word-wrap:break-word;
  border:1px solid transparent;
}
.msg.user{align-self:flex-end; background:var(--user);
  border-color:var(--user-line); color:var(--user-fg)}
.msg.assistant{align-self:flex-start; background:var(--asst);
  border-color:var(--asst-line); color:var(--asst-fg)}
.msg.tool{align-self:flex-start; background:var(--tool);
  border-color:var(--tool-line); color:var(--fg-mute);
  font-size:12.5px}
.msg.thinking{align-self:flex-start; background:transparent; color:var(--fg-mute);
  font-size:12px; font-style:italic; border-left:2px solid var(--border);
  padding:4px 10px; white-space:pre-wrap; max-height:140px; overflow:auto; opacity:.85}
.msg.error{align-self:flex-start; background:#2a151b;
  border-color:#3a1f25; color:#ffb6b6}
.msg.runtime{align-self:center; background:transparent;
  border:1px dashed var(--line); color:var(--fg-mute);
  font-size:12px; padding:6px 12px; max-width:none}
.msg .meta{
  display:block; margin-top:6px; font-size:11px; color:var(--fg-dim);
}
.msg .caret{
  display:inline-block; width:6px; height:13px; vertical-align:-2px;
  background:var(--accent); margin-left:1px;
  animation:blink 1s infinite step-end;
}
@keyframes blink{50%{opacity:0}}

#composer{
  flex:0 0 auto;
  padding:10px 12px; background:var(--bg-soft);
  border-top:1px solid var(--line);
  display:flex; gap:8px; align-items:flex-end;
}
#prompt{
  flex:1 1 auto; resize:none;
  font:inherit; color:var(--fg); background:var(--bg);
  border:1px solid var(--line); border-radius:var(--r);
  padding:10px 12px; min-height:42px; max-height:240px;
  outline:none;
}
#prompt:focus{border-color:var(--accent)}
#composer button{
  font:inherit; cursor:pointer; padding:9px 14px;
  border-radius:var(--r); border:1px solid var(--line);
  background:var(--bg-elev); color:var(--fg);
}
#composer #send{background:var(--accent);color:#0a0c11;border-color:var(--accent);font-weight:600}
#composer #send:disabled{opacity:.5;cursor:not-allowed}
#composer #stop{background:#2a151b;color:#ffb6b6;border-color:#3a1f25}

.empty{
  color:var(--fg-dim); text-align:center; margin:auto 0; font-size:13px;
  padding:20px;
}
.empty .title{color:var(--fg-mute); font-weight:600;
  margin-bottom:6px; font-size:14px}
.empty .cwd{
  color:var(--fg); font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  font-size:12px; margin-top:4px;
}
.empty .hint{color:var(--fg-dim); margin-top:10px; font-size:12px}

.code{font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  background:var(--code-bg); color:var(--code-fg);
  border:1px solid var(--line); border-radius:var(--r);
  padding:10px 12px; overflow-x:auto; font-size:12.5px; margin:6px 0}

.msg.assistant pre.shiki{
  margin:6px 0; padding:10px 12px;
  border:1px solid var(--line); border-radius:var(--r);
  overflow-x:auto; font-size:12.5px;
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
}
.msg.assistant pre.shiki code{display:block; tab-size:4}

.dsml{margin:8px 0; display:flex; flex-direction:column; gap:6px}
.dsml-invoke{
  border:1px solid var(--asst-line); border-left:3px solid var(--accent);
  border-radius:var(--r); background:var(--bg-elev);
}
.dsml-streaming{border-left-color:var(--warn); border-left-style:dashed}
.dsml-summary{
  cursor:pointer; padding:8px 12px;
  display:flex; align-items:center; gap:10px;
  list-style:none; user-select:none;
}
.dsml-summary::-webkit-details-marker{display:none}
.dsml-summary::before{
  content:'\25B8'; color:var(--fg-mute); font-size:10px;
  width:10px; transition:transform .12s ease;
}
.dsml-invoke[open] .dsml-summary::before{transform:rotate(90deg)}
.dsml-tag{
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  font-size:11px; color:var(--accent-strong);
  text-transform:uppercase; letter-spacing:.5px;
}
.dsml-name{
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  font-size:13px; color:var(--fg);
}
.dsml-status{color:var(--warn); font-size:11px; margin-left:auto}
.dsml-body{padding:0 12px 10px}
.dsml-empty{color:var(--fg-mute); font-size:12px; padding:4px 0}
.dsml-params{
  width:100%; border-collapse:collapse;
  font-size:12.5px;
}
.dsml-params td{vertical-align:top; padding:4px 6px}
.dsml-pname{
  width:1%; white-space:nowrap;
  color:var(--fg-mute);
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
}
.dsml-pvalue{color:var(--fg)}
.dsml-pre{
  margin:0; padding:8px 10px;
  background:var(--code-bg); color:var(--code-fg);
  border:1px solid var(--line); border-radius:var(--r);
  overflow-x:auto; font-size:12px;
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
  white-space:pre; tab-size:4;
}
.dsml-inline{
  background:var(--code-bg); color:var(--code-fg);
  border:1px solid var(--line); border-radius:3px;
  padding:1px 6px; font-size:12px;
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Consolas,monospace;
}
.dsml-streaming-dot{margin-left:4px; color:var(--warn)}
.dsml-sub{color:var(--fg-mute); font-family:ui-monospace,monospace; font-size:11px;
  margin-left:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:46%}
/* edit side-by-side diff */
.tc-path{font-family:ui-monospace,monospace; font-size:11px; color:var(--fg-mute);
  padding:4px 12px 6px}
table.tc-diff{width:100%; border-collapse:collapse; table-layout:fixed;
  font-family:ui-monospace,monospace; font-size:12px}
table.tc-diff td{width:50%; vertical-align:top; padding:1px 10px; white-space:pre-wrap;
  word-break:break-word; border-left:1px solid var(--border)}
table.tc-diff td.del{background:rgba(200,70,70,.16)}
table.tc-diff td.add{background:rgba(60,170,90,.16)}
/* bash terminal */
.tc-term{margin:2px 12px 10px; border-radius:6px; overflow:hidden;
  background:var(--code,#0b0e14); border:1px solid var(--border)}
.tc-term .tc-cmd{padding:7px 10px; font-family:ui-monospace,monospace; font-size:12px;
  color:#7ee787}
.tc-term .tc-out{margin:0; padding:8px 10px; border-top:1px solid var(--border);
  font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; overflow:auto;
  max-height:280px}

/* Tool-call cards (#3) */
.toolcard{margin:6px 0; border:1px solid var(--border); border-radius:8px;
  overflow:hidden; background:var(--tool)}
.toolcard>summary{list-style:none; cursor:pointer; padding:7px 11px;
  display:flex; align-items:center; gap:8px; font-size:13px}
.toolcard>summary::-webkit-details-marker{display:none}
.toolcard>summary::before{content:'\25B8'; color:var(--fg-mute);
  transition:transform .12s}
.toolcard[open]>summary::before{transform:rotate(90deg)}
.toolcard .tc-name{font-weight:600}
.toolcard .tc-arg{color:var(--fg-mute); font-family:ui-monospace,monospace;
  font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.toolcard .tc-body{padding:0 11px 10px}
.toolcard pre{margin:0; padding:8px 10px; background:var(--code,#0b0e14);
  border-radius:6px; overflow:auto; font-size:12px;
  font-family:ui-monospace,monospace}

/* Per-turn change panel (#4) */
.turndiff{margin:8px 0; border:1px solid var(--border); border-radius:8px;
  background:var(--asst)}
.turndiff>.td-head{padding:8px 11px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:8px}
.turndiff .td-file{border-top:1px solid var(--border)}
.turndiff .td-file>summary{cursor:pointer; padding:6px 11px; font-size:12px;
  font-family:ui-monospace,monospace; display:flex; align-items:center; gap:8px}
.turndiff .td-file>summary::-webkit-details-marker{display:none}
.turndiff .hunk{border-top:1px dashed var(--border); padding:6px 0}
.turndiff .hunk pre{margin:0; font-size:12px; font-family:ui-monospace,monospace;
  overflow:auto}
.turndiff .dl{display:block; padding:0 11px; white-space:pre}
.turndiff .dl.add{background:rgba(60,160,90,.16)}
.turndiff .dl.del{background:rgba(200,70,70,.16)}
.turndiff .dl.hdr{color:var(--fg-mute)}
.turndiff .revert{float:right; font-size:11px; padding:2px 8px; margin:2px 11px;
  cursor:pointer; border:1px solid var(--border); border-radius:5px;
  background:transparent; color:var(--fg-mute)}
.turndiff .revert:hover{color:var(--fg); border-color:var(--warn)}

/* Dashboard (#5) */
#dash-btn,#reset-btn,#dash-close{cursor:pointer}
#dash-overlay{position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:flex; align-items:flex-start; justify-content:center; z-index:50;
  padding:48px 16px}
#dash-overlay[hidden]{display:none}
#dash-panel{background:var(--bg,#0d1017); border:1px solid var(--border);
  border-radius:12px; width:min(900px,96vw); max-height:80vh; overflow:auto}
#dash-head{display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border-bottom:1px solid var(--border)}
#dash-head h3{margin:0; font-size:15px}
#dash-close{background:transparent; border:none; color:var(--fg-mute);
  font-size:16px}
#dash-table{width:100%; border-collapse:collapse; font-size:13px}
#dash-table th{text-align:left; padding:8px 16px; color:var(--fg-mute);
  cursor:pointer; user-select:none; border-bottom:1px solid var(--border)}
#dash-table td{padding:8px 16px; border-bottom:1px solid var(--border);
  vertical-align:top}
#dash-table tr.row{cursor:pointer}
#dash-table tr.row:hover{background:var(--asst)}
#dash-table tr.active td:first-child{font-weight:700}
.dash-state{font-size:11px; padding:1px 7px; border-radius:10px;
  border:1px solid var(--border)}
.dash-state.ready,.dash-state.busy{color:var(--warn); border-color:var(--warn)}
.dash-prev{color:var(--fg-mute); max-width:340px; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap}
</style>
</head>
<body>
<header>
  <span class="brand">pinback</span>
  <div id="ws-picker">
    <button id="ws-button" title="Switch workspace">
      <span class="label" id="ws-label">No workspace</span>
      <span class="path" id="ws-path"></span>
      <span class="caret">&#9662;</span>
    </button>
  </div>
  <span class="runtime" id="runtime">
    <span><span class="dot" id="up-dot"></span><span id="up-state">connecting&#8230;</span></span>
  </span>
  <button id="dash-btn" title="Cross-workspace dashboard">Dashboard</button>
  <button id="reset-btn" title="Reset this workspace's conversation">Reset</button>
  <div id="ws-tray">
    <h4>Workspaces</h4>
    <div id="ws-list"></div>
    <div id="ws-new">
      <input id="ws-new-path" type="text" placeholder="/absolute/path/to/dir" spellcheck="false" autocomplete="off">
      <button id="ws-new-btn">Add</button>
    </div>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <div class="title">pinback</div>
    Pick a workspace to start.
    <div class="hint">A workspace is just a directory the agent runs in.</div>
  </div>
</div>

<div id="composer">
  <textarea id="prompt" rows="1" placeholder="Message ds4-agent&#8230;" autofocus></textarea>
  <button id="stop" hidden>Stop</button>
  <button id="send">Send</button>
</div>

<div id="dash-overlay" hidden>
  <div id="dash-panel">
    <div id="dash-head">
      <h3>Workspaces</h3>
      <button id="dash-close" title="Close">&#10005;</button>
    </div>
    <table id="dash-table">
      <thead><tr>
        <th data-sort="label">Workspace</th>
        <th data-sort="state">State</th>
        <th data-sort="last_active_ms">Last active</th>
        <th data-sort="preview">Last turn</th>
      </tr></thead>
      <tbody id="dash-rows"></tbody>
    </table>
  </div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
